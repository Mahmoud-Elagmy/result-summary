<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Results summary component</title>

</head>

<body>
  <div class="container">
    <div class="left center">
      <h1>Your Result</h1>
      <div class="grade center">76
        <span>of 100</span>
      </div>
      <h2>Great</h2>
      <p>You scored higher than 65% of the people who have taken these tests.</p>
    </div>
    <div class="right center">
      <h1>Summary</h1>
      <div class="description center">
        <div class="reaction center">
          <img src="assets/images/icon-reaction.svg" alt="reaction">
          <p>Reaction</p>
          <p>80</p>
          <p>/ 100</p>
        </div>
        <div class="memory center">
          <img src="assets/images/icon-memory.svg" alt="memory">
          <p>Memory</p>
          <p>92</p>
          <p>/ 100</p>
        </div>
        <div class="verbal center">
          <img src="assets/images/icon-verbal.svg" alt="verbal">
          <p>Verbal</p>
          <p>61</p>
          <p>/ 100</p>
        </div>
        <div class="visual center">
          <img src="assets/images/icon-visual.svg" alt="visual">
          <p>Visual</p>
          <p>73</p>
          <p>/ 100</p>
        </div>
      </div>
      <button type="button">Continue</button>
    </div>
  </div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Mahmoud Elagmy</a>.
  </footer>
</body>

</html>
